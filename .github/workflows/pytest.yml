name: pytest

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        shell: pwsh
        run: |
          if (Test-Path tests) {
            python -m pytest tests
          } else {
            Write-Host "No tests directory found; pytest step skipped."
          }

      - name: Blocked text scan
        shell: pwsh
        run: ./scripts/secret_scan.ps1
